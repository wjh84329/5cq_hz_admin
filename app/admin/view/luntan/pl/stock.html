<div class="layuimini-container">
    <form id="app-form" class="layui-form layuimini-form">
        <div class="layui-form-item">
            <label class="layui-form-label">审核状态</label>
            <div class="layui-input-inline">
                {if $list.is_sh==0}
                <input type="radio" name="is_sh" value="0" title="未审核" checked>
                <input type="radio" name="is_sh" value="1" title="审核通过">
                <input type="radio" name="is_sh" value="2" title="审核未通过">
                {elseif $list.is_sh==1}
                <input type="radio" name="is_sh" value="0" title="未审核">
                <input type="radio" name="is_sh" value="1" title="审核通过" checked>
                <input type="radio" name="is_sh" value="2" title="审核未通过">
                {else}
                <input type="radio" name="is_sh" value="0" title="未审核">
                <input type="radio" name="is_sh" value="1" title="审核通过">
                <input type="radio" name="is_sh" value="2" title="审核未通过" checked>
                {/if}
            </div>
        </div>
        <div class="hr-line"></div>
        <div class="layui-form-item text-center">
            <button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit>确认</button>
            <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">重置</button>
        </div>

    </form>
</div>
