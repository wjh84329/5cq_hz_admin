<div class="layuimini-container">
    <form id="app-form" class="layui-form layuimini-form">

        <div class="layui-form-item">
            <label class="layui-form-label">用户名</label>
            <div class="layui-input-block">
                <input type="text" class="layui-input" disabled value="{$list.username|default=''}">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">余额</label>
            <div class="layui-input-block">
                <input type="text" name="num" class="layui-input" disabled value="{$list.money|default=''}">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">减少数量</label>
            <div class="layui-input-block">
                <input type="number" name="number" class="layui-input" lay-verify="required" placeholder="请输入入库数量" value="0">
            </div>
        </div>

        <div class="hr-line"></div>
        <div class="layui-form-item text-center">
            <button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit>确认</button>
            <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">重置</button>
        </div>

    </form>
</div>
