<div class="layui-tab-content">
  <div class="layui-tab-item layui-show">
    <form id="app-form" class="layui-form layuimini-form">

        <label class="layui-form-label required">客服QQ号码</label>
        <div class="layui-input-block flex">
          <input type="text" name="qq" class="layui-input" value="{$list1.qq|default=''}">
          <tip>客服QQ号码,与运营参数配置里的基础参数配置一致</tip>
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label required">h5访问地址</label>

          <input type="text" name="redirect_url" class="layui-input" value="{$list2.redirect_url|default=''}">

        </div>
      </div>
      <div class="layui-form-item text-center">
        <button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit>生成菜单</button>
<!--        <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">重置</button>-->
