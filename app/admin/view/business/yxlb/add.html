<div class="layui-tab-content">
    <div class="layui-tab-item layui-show">
        <form id="app-form" class="layui-form">
            <div class="layui-form-item">
                <label class="layui-form-label">游戏名称</label>
                <div class="layui-input-inline">
                    <input type="text" name="yx_name" required lay-verify="required" placeholder="0000" autocomplete="off" class="layui-input" value="">
                </div>
                <div class="layui-form-mid layui-word-aux">游戏名称</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">游戏图标</label>
                <div class="layui-input-block layuimini-upload">
                    <input name="yxlogo" type="hidden" class="layui-input layui-col-xs6" lay-verify="required" lay-reqtext="请上传分类图片" placeholder="请上传分类图片" value="">
                    <div class="layui-input-inline">
                        <span><a class="layui-btn" data-upload="yxlogo" data-upload-number="one" data-upload-exts="*image" data-upload-icon="image"><i class="fa fa-upload"></i> 上传</a></span>
                    </div>
                </div>
<!--                <div class="layui-form-mid layui-word-aux">游戏图标</div>-->
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">游戏banner</label>
                <div class="layui-input-block layuimini-upload">
                    <input name="yx_banner" type="hidden" class="layui-input layui-col-xs6" lay-verify="required" lay-reqtext="请上传分类图片" placeholder="请上传分类图片" value="">
                    <div class="layui-input-inline">
                        <span><a class="layui-btn" data-upload="yx_banner" data-upload-number="one" data-upload-exts="*image" data-upload-icon="image"><i class="fa fa-upload"></i> 上传</a></span>
                    </div>
                </div>
                <!--                <div class="layui-form-mid layui-word-aux">游戏图标</div>-->
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">游戏公司</label>
                <div class="layui-input-inline">
                    <input type="text" name="yxgs" required lay-verify="required" placeholder="0000" autocomplete="off" class="layui-input" value="">
                </div>
                <div class="layui-form-mid layui-word-aux">游戏公司</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">游戏分类</label>
                <div class="layui-input-inline">
                    <select name="zylx" lay-verify="required">
                        <option value=""></option>
                        {volist name="fl_list" id="list"}
                        <option value="{$list.fl_name}">{$list.fl_name}</option>
                        {/volist}
                        <!--<option value="单职业">单职业</option>
                        <option value="三职业">三职业</option>-->
                    </select>
                </div>
                <div class="layui-form-mid layui-word-aux">游戏语言</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">游戏语言</label>
                <div class="layui-input-inline">
                    <select name="yxyy" lay-verify="required">
                        <option value=""></option>
                        <option value="简体中文">简体中文</option>
                        <option value="繁体中文">繁体中文</option>
                    </select>
                </div>
                <div class="layui-form-mid layui-word-aux">游戏语言</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">游戏版本</label>
                <div class="layui-input-inline">
                    <input type="text" name="yxbb" required lay-verify="required" placeholder="0000" autocomplete="off" class="layui-input" value="">
                </div>
                <div class="layui-form-mid layui-word-aux">游戏版本</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">游戏大小</label>
                <div class="layui-input-inline">
                    <input type="text" name="yxdx" required lay-verify="required" placeholder="0000" autocomplete="off" class="layui-input" value="">
                </div>
                <div class="layui-form-mid layui-word-aux">游戏大小</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">下载次数</label>
                <div class="layui-input-inline">
                    <input type="text" name="xzcs" required lay-verify="required" placeholder="0000" autocomplete="off" class="layui-input" value="">
                </div>
                <div class="layui-form-mid layui-word-aux">下载次数</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">下载链接</label>
                <div class="layui-input-inline">
                    <input type="text" name="xzlj" required lay-verify="required" placeholder="0000" autocomplete="off" class="layui-input" value="">
                </div>
                <div class="layui-form-mid layui-word-aux">下载链接</div>
            </div>
            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">游戏简介</label>
                <div class="layui-input-block ">
                    <textarea name="yxjj" placeholder="请输入内容" class="layui-textarea"></textarea>
                </div>
<!--                <div class="layui-form-mid layui-word-aux">游戏简介</div>-->
            </div>
            <div class="layui-form-item layui-form-text">
                <label class="layui-form-label">详情</label>
                <div class="layui-input-block ">
                    <textarea name="xq" rows="20" class="layui-textarea editor" placeholder="请输入游戏详情"></textarea>
                </div>
<!--                <div class="layui-form-mid layui-word-aux">详情</div>-->
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">是否热门</label>
                <div class="layui-input-inline">
                    <input type="radio" name="is_rm" value="0" title="热门" checked>
                    <input type="radio" name="is_rm" value="1" title="不热门">
                </div>
                <div class="layui-form-mid layui-word-aux">是否热门</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">是否推荐</label>
                <div class="layui-input-inline">
                    <input type="radio" name="is_tj" value="0" title="推荐" checked>
                    <input type="radio" name="is_tj" value="1" title="不推荐">
                </div>
                <div class="layui-form-mid layui-word-aux">是否推荐</div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">是否首页</label>
                <div class="layui-input-inline">
                    <input type="radio" name="is_sy" value="0" title="是" checked>
                    <input type="radio" name="is_sy" value="1" title="否">
                </div>
                <div class="layui-form-mid layui-word-aux">是否首页</div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn" lay-submit lay-filter="formDemo">立即提交</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
    </div>
</div>
