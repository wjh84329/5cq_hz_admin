<div class="layuimini-container">
    <form id="app-form" class="layui-form layuimini-form">

        <div class="layui-form-item">
            <label class="layui-form-label required">物品名称</label>
            <div class="layui-input-block">
                <input type="text" name="title" class="layui-input" lay-verify="required" placeholder="请输入物品名称">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label required">物品最小价值</label>
            <div class="layui-input-block">
                <input type="number" name="value_min" step="1" min="0" class="layui-input" lay-verify="required" placeholder="请输入物品最小价值">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label required">物品最大价值</label>
            <div class="layui-input-block">
                <input type="number" name="value_max" step="1" min="0" class="layui-input" lay-verify="required" placeholder="请输入物品最大价值">
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">物品图片</label>
            <div class="layui-input-block layuimini-upload">
                <input name="images" class="layui-input layui-col-xs6" placeholder="请上传物品图片">
                <div class="layuimini-upload-btn">
                    <span><a class="layui-btn" data-upload="images" data-upload-number="one" data-upload-exts="*image" data-upload-icon="image"><i class="fa fa-upload"></i> 上传</a></span>
                    <span>
                        <a class="layui-btn layui-btn-normal"
                            id="select_images"
                            data-upload-select="images"
                            data-upload-number="one"
                            data-upload-mimetype="image/*">
                            <i class="fa fa-list"></i> 选择
                        </a>
                    </span>
                </div>
            </div>
        </div>

        <div class="hr-line"></div>
        <div class="layui-form-item text-center">
            <button type="submit" class="layui-btn layui-btn-normal layui-btn-sm" lay-submit>确认</button>
            <button type="reset" class="layui-btn layui-btn-primary layui-btn-sm">重置</button>
        </div>

    </form>
</div>
